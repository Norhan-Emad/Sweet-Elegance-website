<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./images/ChatGPT_Image_Feb_21__2026__05_22_53_PM-removebg-preview.png"
      type="image/x-icon"
    />
    <!--///////////// fonts//////////////// -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- /////////////font awesome /////////////////// -->
    <script
      src="https://kit.fontawesome.com/e9a68c4ebb.js"
      crossorigin="anonymous"
    ></script>
    <!-- //////////////////bootstrap////////// -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- ////////////////////css///////////////// -->
    <link rel="stylesheet" href="./css/login.css" />
    <title>logIn</title>
  </head>
  <body>
    <main class="position-relative">
        <div id="start">
            <div class="image h-100">
                <img src="./images/ChatGPT_Image_Feb_21__2026__05_22_53_PM-removebg-preview.png" alt="logo">
            </div>
        </div>
        <div id="logIn">
            <div class="image">
                <img src="./images/ChatGPT Image Feb 27, 2026, 08_09_48 AM.png" alt="icingDrop" class="w-100 position-absolute top-0 start-0 z-n1">
            </div>
            <div class="container d-flex align-items-center justify-content-center position-relative">
                <div class="row d-flex align-items-center justify-content-center logForm mt-3 p-4">
                    <div class="col-lg-6 col-md-12">
                        <div class="formImage">
                            <img src="./images/ChatGPT Image Feb 28, 2026, 07_20_49 PM.png" alt="image" class=" rounded-2" >
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-12">
                        <div class="head text-center">
                            <h2 class="mb-2">Log in to enjoy your favorite cakes</h2>
                            <p class="mb-0">Access your account to track orders, save favorites, and get exclusive sweet offers.</p>
                        </div>
                        <div class="row g-3 p-2">
                            <div class="col-md-12">
                                <label for="inputEmail" class="form-label mb-0">Email</label>
                                <input type="email" class="form-control" id="inputEmail">
                            </div>
                            <div class="col-md-12">
                                <label for="inputPassword" class="form-label mb-0">Password</label>
                                <input type="password" class="form-control" id="inputPassword">
                            </div>
                            <div class="col-md-12 d-flex justify-content-between align-items-center">
                                <div class="form-check brownColor">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label" for="remember">
                                        Remember me
                                    </label>
                                </div>
                                <a class="fw-bold text-decoration-none" style="color: var(--primaryheading) !important;" href="">forget password?</a>
                            </div>
                            <div class="alert alert-danger mb-0 d-none" role="alert" id="alert">
                                A simple danger alert—check it out!
                            </div>
                            <div class="col-md-12 d-flex align-items-center justify-content-center text-center">
                                <a class="text-decoration-none text-light log" id="log" href="">Log in</a>
                            </div>
                            <div class="col-md-12 text-center">
                                <h5 class="or py-2">OR Continue With</h5>
                                <div class="buttons d-flex justify-content-between align-items-center">
                                    <button class="loginButtons mb-2 d-flex justify-content-center align-items-center "><i class="fa-brands fa-google fs-5 me-1"></i>Google</button>
                                <button class="loginButtons mb-2 mx-2 justify-content-center align-items-center"><i class="fa-brands fa-apple fs-5 me-1"></i>Apple</button>
                                <button class="loginButtons mb-2 justify-content-center align-items-center"><i class="fa-brands fa-facebook-f fs-5 me-1"></i>Facebook</button>
                                </div>
                                <h5 class="py-2">Don't have an account? <a href="/SignUp.html" class="strawberryCream">Sign up</a></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- ///////////////////bootstrap js////////////// -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- ///////////////////////js///////////// -->
    <script src="./js/logIn.js"></script>
  </body>
</html>
